# Authelia OIDC-Konfiguration für den HERO MCP Server
# Diesen Block in deine bestehende configuration.yml unter identity_providers.oidc.clients einfügen
#
# Authelia 4.39+ akzeptiert für OIDC-Client-Secrets nur noch pbkdf2 oder argon2id —
# bcrypt ist deprecated und führt zu "client secret did not match"-Fehlern am
# Token-Endpoint. Hash erzeugen mit:
#
#   docker run --rm authelia/authelia:latest \
#     authelia crypto hash generate pbkdf2 --variant sha512 \
#     --password 'dein_secret_klartext'
#
# Den 'Digest:' Wert (z.B. $pbkdf2-sha512$310000$...) als client_secret unten eintragen.
# Der Klartext kommt in OIDC_CLIENT_SECRET im Stack.

identity_providers:
  oidc:
    hmac_secret: CHANGE_ME_RANDOM_SECRET_32_CHARS
    issuer_certificate_chain: |
      -----BEGIN CERTIFICATE-----
      # Dein Authelia-Zertifikat hier einfügen
      -----END CERTIFICATE-----
    issuer_private_key: |
      -----BEGIN PRIVATE KEY-----
      # Deinen privaten Schlüssel hier einfügen
      -----END PRIVATE KEY-----

    access_token_lifespan: 12h
    authorize_code_lifespan: 1m
    id_token_lifespan: 12h
    refresh_token_lifespan: 90m
    enable_client_debug_messages: false

    cors:
      endpoints:
        - authorization
        - token
        - revocation
        - introspection
      allowed_origins:
        - "*"
      allowed_origins_from_client_redirect_uris: false

    clients:
      - client_id: claude-mcp
        client_name: Claude MCP
        client_secret: '$pbkdf2-sha512$310000$PBKDF2_HASH_OF_YOUR_SECRET_HERE'
        public: false
        authorization_policy: one_factor
        redirect_uris:
          - https://claude.ai/api/mcp/auth_callback
        scopes: [openid, profile, email, offline_access, address, phone, groups]
        grant_types: [authorization_code, refresh_token]
        response_types: [code]
        token_endpoint_auth_method: client_secret_post
        introspection_endpoint_auth_method: client_secret_basic
